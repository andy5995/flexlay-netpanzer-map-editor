name: AppImage
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    tags:
      - 'v*'
    branches: [main, qt-port]
    paths:
      - '**'
      - '!**.md'
      - '!**.yml'
      - '**/appimage.yml'
      - 'make-appimage.sh'
      - 'AppRun'
  pull_request:
    branches: [main]
    paths:
      - '**'
      - '!**.md'
      - '!**.yml'
      - '**/appimage.yml'
      - 'make-appimage.sh'
      - 'AppRun'

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set version
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"
            else
              VERSION="snapshot"
            fi
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          fi

      - name: Build AppImage
        run: |
          export HOSTUID=$(id -u) HOSTGID=$(id -g)
          VERSION="${VERSION}" docker compose run --rm build

      - name: Checksum
        run: |
          ARCH=$(uname -m)
          echo "ARCH=${ARCH}" >> "$GITHUB_ENV"
          cd out
          file=$(ls *.AppImage)
          sha256sum "$file" > "$file.sha256sum"

      - name: Upload artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: netpanzer-editor-appimage-${{ env.ARCH }}
          path: ./out/*AppImage*
          if-no-files-found: error

      - name: Prerelease (main)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          body: "NetPanzer Map Editor Snapshot Release"
          allowUpdates: true
          prerelease: true
          removeArtifacts: false
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: snapshot
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
        uses: ncipollo/release-action@v1
        with:
          artifacts: "./out/*AppImage*"
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
