name: MSYS2
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number'
        required: false
        type: string
  push:
    branches: [main, qt-port]
    paths:
      - '**'
      - '!**.md'
      - '**/msys2.yml'
  pull_request:
    branches: [main]
    paths:
      - '**'
      - '!**.md'
      - '**/msys2.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ inputs.version }}

    steps:
      - uses: actions/checkout@v6

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-pkg-config

      - name: Build
        shell: msys2 {0}
        run: |
          meson setup build
          ninja -C build

      - name: Test
        shell: msys2 {0}
        run: |
          meson test -C build --print-errorlogs

      - name: Stage installer files
        shell: msys2 {0}
        run: |
          mkdir -p _staging/platforms
          cp build/netpanzer-editor.exe _staging/
          bash packaging/windows/collect-dlls.sh _staging/netpanzer-editor.exe _staging/
          cp "$MINGW_PREFIX/share/qt5/plugins/platforms/qwindows.dll" _staging/platforms/

      - name: Set version
        shell: bash
        run: |
          if [[ -z "${VERSION}" ]]; then
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"
            else
              VERSION="snapshot"
            fi
            echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          fi

      - name: Build installer
        shell: pwsh
        run: |
          iscc /DVERSION=$env:VERSION /DARCH=x86_64 packaging\windows\netpanzer-editor.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Checksum
        shell: pwsh
        run: |
          $file = "netpanzer-editor-$env:VERSION-windows-x86_64-setup.exe"
          $hash = (Get-FileHash $file -Algorithm SHA256).Hash.ToLower()
          "$hash  $file" | Out-File -Encoding ascii "$file.sha256sum"

      - name: Upload artifact
        if: github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: netpanzer-editor-windows-installer
          path: netpanzer-editor-${{ env.VERSION }}-windows-x86_64-setup.exe*
          if-no-files-found: error

      - name: Prerelease (main)
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "netpanzer-editor-${{ env.VERSION }}-windows-x86_64-setup.exe*"
          allowUpdates: true
          prerelease: true
          removeArtifacts: false
          replacesArtifacts: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          tag: snapshot
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release (tagged)
        if: startsWith(github.ref, 'refs/tags/') || inputs.version != ''
        uses: ncipollo/release-action@v1
        with:
          artifacts: "netpanzer-editor-${{ env.VERSION }}-windows-x86_64-setup.exe*"
          tag: ${{ inputs.version != '' && format('v{0}', env.VERSION) || '' }}
          allowUpdates: true
          prerelease: false
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
